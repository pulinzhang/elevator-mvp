name = "elevator-mvp"
main = ".open-next/worker.js"
compatibility_date = "2026-02-25"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = ".open-next/assets"

# D1 数据库配置
[[d1_databases]]
binding = "DB"
database_name = "elevator-db"
database_id = "a6b043f2-0849-4b62-bede-e6526486bf91"

# 本地开发配置
[vars]
ENV = "development"
USE_MOCK_DATA = "true"

# 排除 resvg（图片功能在开发环境不需要）
build.exclude = ["resvg", "@resvg/resvg-wasm"]
